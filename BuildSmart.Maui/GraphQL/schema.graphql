schema {
  query: Query
  mutation: Mutation
}

"The root query object."
type Query {
  "Gets a queryable list of tradesman profiles."
  tradesmanProfiles: [TradesmanProfile!]!
  "Gets the currently authenticated user."
  currentUser: User
  "Gets a list of all active service categories."
  serviceCategories: [ServiceCategory!]!
  "Gets all service categories, regardless of status. (Admin only)"
  allServiceCategories: [ServiceCategory!]!
  "Gets the projects created by the authenticated homeowner."
  myProjects: [Project!]!
  "Gets unread notifications for the current user."
  myNotifications: [Notification!]!
  "Gets job posts waiting for admin review."
  jobPostsForReview: [JobPost!]!
  "Gets projects waiting for admin review."
  projectsForReview: [Project!]!
  "Gets a list of all users. (Admin only)"
  users: [User!]!
  "Gets all open auctions that match the authenticated tradesman's skills."
  availableAuctions: [Auction!]!
  "Gets a specific auction by Job ID."
  auctionById(jobId: UUID!): Auction
  "Gets the auctions that the current tradesman has passed/dismissed."
  passedAuctions: [Auction!]!
}

type Auction {
    job: JobPost!
    bids: [Bid!]!
    questions: [JobPostQuestion!]!
}

type JobPostQuestion {
    id: UUID!
    jobPostId: UUID!
    parentQuestionId: UUID
    tradesmanProfileId: UUID
    tradesmanProfile: TradesmanProfile
    authorId: UUID
    author: User
    replies: [JobPostQuestion!]!
    questionText: String!
    answerText: String
    answeredAt: DateTime
    isAnswered: Boolean!
    isEdited: Boolean!
    isAnswerEdited: Boolean!
    createdAt: DateTime!
    updatedAt: DateTime!
}

type Notification {
    id: UUID!
    title: String!
    message: String!
    isRead: Boolean!
    relatedEntityId: UUID
    relatedEntityType: String
    createdAt: DateTime!
}

"The root mutation object."
type Mutation {
  "Hashes all existing plain-text passwords in the database. This is a one-time operation."
  migratePasswords: Int!
  "Authenticates a user and returns a JWT."
  login(email: String! password: String!): String!
  "Creates a new user in the system."
  registerUser(firstName: String! lastName: String! email: String! password: String!): User!
  "Updates the user's profile information."
  updateUserProfile(userId: UUID!, firstName: String!, lastName: String!, bio: String, location: String, profilePictureUrl: String): User!
  "Creates a new service booking request."
  createBooking(homeownerId: UUID! tradesmanProfileId: UUID! requestedDate: DateTime! jobDescription: String!): Booking!
  "Submits a review and updates the tradesman's average rating."
  submitReview(bookingId: UUID! homeownerId: UUID! rating: Int! comment: String!): Review!
  
  "Creates a new project for a homeowner."
  createProject(homeownerId: UUID! title: String! description: String!): Project!
  
  "Adds a sub-job to a project using the Wizard output."
  addJobToProject(projectId: UUID! categoryId: UUID! title: String! jobDetailsJson: String! location: String estimatedSubtotal: Decimal currency: String! imageUrls: [String!]!): JobPost!
  
  "Submits a bid for a specific job post."
  submitBid(tradesmanProfileId: UUID! jobPostId: UUID! subtotal: Decimal! currency: String! comment: String): Bid!
  
  "Accepts a bid and creates a funded booking."
  acceptBid(bidId: UUID!): Booking!
  
  "Creates a new service category with a smart blueprint template."
  createServiceCategory(name: String!, description: String, templateStructure: String!): ServiceCategory!

  "Creates or updates a service category. If ID is null, creates a new one."
  saveCategory(id: UUID, name: String!, description: String, isGlobal: Boolean!, templateStructure: String!, status: CategoryStatus): ServiceCategory!

  "Updates the status of a service category. (Admin only)"
  updateCategoryStatus(categoryId: UUID!, newStatus: CategoryStatus!): ServiceCategory!

  "Deletes a project by ID."
  deleteProject(projectId: UUID!): Boolean!

  "Saves a draft of a job post without validation."
  saveJobPostDraft(jobPostId: UUID! jobDetailsJson: String! description: String location: String estimatedSubtotal: Decimal currency: String!): Boolean!

  "Validates and submits a job post for review."
  submitJobPost(jobPostId: UUID!): Boolean!

  "Submits a job post for AI scope generation."
  submitJobForScopeGeneration(jobPostId: UUID!): Boolean!

  "Approves the AI-generated scope for a job post."
  approveJobScope(jobPostId: UUID!, finalScope: String!): Boolean!

  "Reviews the job post scope (Admin only)."
  adminReviewJobScope(jobPostId: UUID!, approved: Boolean!, feedback: String): Boolean!

  "Adds a feedback/clarification message to a job post."
  addJobFeedback(jobPostId: UUID!, text: String!): JobPostFeedback!

  "Resolves a specific feedback item (Admin only)."
  resolveJobFeedback(feedbackId: UUID!): Boolean!

  "Adds a project-specific clarification question to a job post (Admin only)."
  addAdminJobQuestion(jobPostId: UUID!, questionText: String!, type: String!, isRequired: Boolean!, options: [String!]): Boolean!

  "Updates a user's role and associated service categories. (Admin only)"
  updateUserRoleAndCategories(userId: UUID!, newRole: UserRoleTypes!, serviceCategoryIds: [UUID!]): User!

  "Allows a tradesman to ask a public question on an auction."
  askJobQuestion(tradesmanProfileId: UUID!, jobPostId: UUID!, questionText: String!): JobPostQuestion!

  "Allows a tradesman to edit their public question."
  editJobQuestion(questionId: UUID!, newText: String!): JobPostQuestion!

  "Allows a homeowner to answer a tradesman's question."
  answerJobQuestion(questionId: UUID!, answerText: String!): JobPostQuestion!

  "Allows a homeowner to edit their public answer."
  editJobAnswer(questionId: UUID!, newAnswer: String!): JobPostQuestion!

  "Allows any user to reply to a specific question."
  replyToJobQuestion(parentQuestionId: UUID!, replyText: String!): JobPostQuestion!

  "Hides an auction from the tradesman's available feed."
  passAuction(tradesmanProfileId: UUID!, jobPostId: UUID!): Boolean!

  "Restores a previously passed auction for a tradesman."
  restoreAuction(jobId: UUID!): Boolean!

  "Uploads a portfolio entry for a tradesman."
  addPortfolioEntry(title: String!, description: String, file: Upload!): PortfolioEntry!

  "Uploads a certification for a tradesman."
  addCertification(title: String!, description: String, file: Upload!, issuedAt: DateTime!, expiresAt: DateTime): Certification!

  "Updates the video introduction for a tradesman."
  updateVideoIntroduction(file: Upload!): Boolean!

  "Deletes all notifications for the current user."
  deleteAllNotifications: Boolean!

  "Marks a specific notification as read."
  markNotificationAsRead(notificationId: UUID!): Boolean!
}

type JobPostFeedback {
    id: UUID!
    jobPostId: UUID!
    authorId: UUID!
    author: User!
    text: String!
    isResolved: Boolean!
    createdAt: DateTime!
    updatedAt: DateTime!
}

"Represents the specific profile for a tradesman."
type TradesmanProfile {
  id: UUID!
  userId: UUID!
  averageRating: Float!
  isVerified: Boolean!
  videoIntroductionUrl: String
  user: User!
  skills: [TradesmanSkill!]!
  portfolioEntries: [PortfolioEntry!]!
  certifications: [Certification!]!
  bookings: [Booking!]!
  reviews: [Review!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type Certification {
    id: UUID!
    title: String!
    description: String
    documentUrl: String!
    issuedAt: DateTime!
    expiresAt: DateTime
    tradesmanProfileId: UUID!
    createdAt: DateTime!
    updatedAt: DateTime!
}

"Represents a specific skill or service category offered by a tradesman."
type TradesmanSkill {
    id: UUID!
    serviceCategoryId: UUID!
    verificationStatus: SkillVerificationStatus!
    serviceCategory: ServiceCategory!
}

type ServiceCategory {
  id: UUID!
  name: String!
  description: String
  status: CategoryStatus!
  isGlobal: Boolean!
  templateStructure: String!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type Project {
    id: UUID!
    title: String!
    description: String!
    status: ProjectStatus!
    generalSummary: String
    homeowner: User!
    jobPosts: [JobPost!]!
    createdAt: DateTime!
    updatedAt: DateTime!
}

type JobPost {
    id: UUID!
    title: String!
    description: String!
    generatedScope: String
    userEditedScope: String
    adminFeedback: String
    jobDetails: String!
    additionalQuestionsJson: String
    location: String
    imageUrls: [String!]!
    estimatedBudget: Amount
    amendmentCount: Int!
    status: JobPostStatus!
    project: Project!
    serviceCategory: ServiceCategory!
    bids: [Bid!]!
    feedbacks: [JobPostFeedback!]!
    questions: [JobPostQuestion!]!
    createdAt: DateTime!
    updatedAt: DateTime!
}

type Bid {
    id: UUID!
    amount: Amount!
    comment: String
    linkedAmendmentVersion: Int!
    isAccepted: Boolean!
    isRejected: Boolean!
    isOutdated: Boolean!
    jobPost: JobPost!
    tradesmanProfile: TradesmanProfile!
    createdAt: DateTime!
    updatedAt: DateTime!
}

"Represents a user of the application."
type User {
  id: UUID!
  firstName: String!
  lastName: String!
  email: String!
  phoneNumber: String
  role: UserRoleTypes!
  bio: String
  location: String
  profilePictureUrl: String
  isEmailVerified: Boolean!
  tradesmanProfile: TradesmanProfile
  createdAt: DateTime!
  updatedAt: DateTime!
}

"Represents a booking."
type Booking {
  id: UUID!
  requestedDate: DateTime!
  scheduledDate: DateTime
  jobDescription: String
  status: BookingStatusTypes!
  homeownerId: UUID!
  tradesmanProfileId: UUID!
  agreedBidAmount: Amount
  totalEscrowAmount: Amount
  homeowner: User!
  tradesmanProfile: TradesmanProfile!
  review: Review
  createdAt: DateTime!
  updatedAt: DateTime!
}

type Review {
  id: UUID!
  rating: Int!
  comment: String
  bookingId: UUID!
  booking: Booking!
  homeowner: User!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type Amount {
  currency: String!
  subtotal: Decimal!
  tax: Decimal!
  total: Decimal!
}

type PortfolioEntry {
  id: UUID!
  title: String!
  description: String
  imageUrl: String!
  videoUrl: String
  tradesmanProfileId: UUID!
  createdAt: DateTime!
  updatedAt: DateTime!
}

enum UserRoleTypes {
  HOMEOWNER
  TRADESMAN
  ADMIN
}

enum BookingStatusTypes {
  PENDING
  CONFIRMED
  COMPLETED
  CANCELLED
  DECLINED
}

enum CategoryStatus {
    DRAFT
    ACTIVE
    ARCHIVED
}

enum SkillVerificationStatus {
    UNVERIFIED
    PORTFOLIO_VERIFIED
    COMMUNITY_VERIFIED
    LICENSE_VERIFIED
}

enum ProjectStatus {
    DRAFT
    UNDER_REVIEW
    ACTIVE
    COMPLETED
    ARCHIVED
}

enum JobPostStatus {
    DRAFT
    GENERATING_SCOPE
    WAITING_FOR_USER_REVIEW
    WAITING_FOR_ADMIN_REVIEW
    UNDER_REVIEW
    OPEN
    BIDDING_CLOSED
    CONTRACTED
    CANCELLED
    EXPIRED
    REJECTED
}

scalar DateTime
scalar UUID
scalar Decimal
scalar Upload
