schema {
  query: Query
  mutation: Mutation
}

type Amount {
  currency: String!
  subtotal: Decimal!
  tax: Decimal!
  total: Decimal!
}

"Represents a wrapper for a job post during its active bidding phase (Auction)."
type Auction {
  "The underlying job post information."
  job: JobPost
  "The current list of bids for this job."
  bids: [Bid!]! @cost(weight: "10")
  "The Q&A history for this auction."
  questions: [JobPostQuestion!]! @cost(weight: "10")
}

type Bid {
  isOutdatedVersion(currentJobVersion: Int!): Boolean!
  jobPostId: UUID!
  jobPost: JobPost!
  tradesmanProfileId: UUID!
  tradesmanProfile: TradesmanProfile!
  amount: Amount!
  bidItems: [BidItem!]!
  earliestStartDate: DateTime
  latestStartDate: DateTime
  estimatedDurationDays: Int
  comment: String
  linkedAmendmentVersion: Int!
  isAccepted: Boolean!
  acceptedAt: DateTime
  isRejected: Boolean!
  isOutdated: Boolean!
  id: UUID!
  createdAt: DateTime!
  updatedAt: DateTime!
}

"Represents a priced item within a bid, mapping to a specific JobTask."
type BidItem {
  id: UUID!
  bidId: UUID!
  jobTaskId: UUID!
  "The price proposed for this task."
  price: Amount!
  comment: String
  jobTask: JobTask!
  bid: Bid!
  createdAt: DateTime!
  updatedAt: DateTime!
}

"Represents a booking for a service from a homeowner to a tradesman."
type Booking {
  id: ID!
  requestedDate: DateTime!
  scheduledDate: DateTime
  jobDescription: String
  status: BookingStatusTypes!
  homeownerId: ID!
  tradesmanProfileId: ID!
  agreedBidAmount: Amount!
  platformFeeHomeowner: Amount!
  platformFeeTradesman: Amount!
  totalEscrowAmount: Amount!
  isFunded: Boolean!
  homeowner: User!
  tradesmanProfile: TradesmanProfile!
  review: Review
  changeOrders: [ChangeOrder!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type Certification {
  id: ID!
  title: String!
  documentUrl: String!
  issuedAt: DateTime!
  expiresAt: DateTime
  description: String
  tradesmanProfileId: UUID!
  tradesmanProfile: TradesmanProfile!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type ChangeOrder {
  bookingId: UUID!
  booking: Booking!
  newTotalAmount: Amount!
  differenceAmount: Amount!
  reason: String!
  status: ChangeOrderStatus!
  id: UUID!
  createdAt: DateTime!
  updatedAt: DateTime!
}

"Represents the specific profile for a homeowner."
type HomeownerProfile {
  id: ID!
  userId: ID!
  address: String
  user: User!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type JobPost {
  feedbacks: [JobPostFeedback!]! @cost(weight: "10")
  bids: [Bid!]! @cost(weight: "10")
  jobTasks: [JobTask!]! @cost(weight: "10")
  questions: [JobPostQuestion!]! @cost(weight: "10")
  homeownerProfileId: UUID!
  homeownerProfile: HomeownerProfile!
  projectId: UUID!
  project: Project!
  serviceCategoryId: UUID!
  serviceCategory: ServiceCategory!
  title: String!
  jobDetails: String!
  description: String!
  generatedScope: String
  userEditedScope: String
  adminFeedback: String
  additionalQuestionsJson: String
  location: String!
  imageUrls: [String!]!
  status: JobPostStatus!
  estimatedBudget: Amount
  amendmentCount: Int!
  id: UUID!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type JobPostFeedback {
  id: ID
  jobPostId: ID
  jobPost: JobPost
  authorId: ID
  author: User
  text: String!
  isResolved: Boolean!
  isEdited: Boolean!
  createdAt: DateTime!
  updatedAt: DateTime!
  parentFeedbackId: ID
  parentFeedback: JobPostFeedback
  replies: [JobPostFeedback!]!
  isEditable: Boolean! @cost(weight: "10")
}

type JobPostQuestion {
  id: UUID!
  questionText: String!
  answerText: String
  answeredAt: DateTime
  isAnswered: Boolean!
  isEdited: Boolean!
  isAnswerEdited: Boolean!
  parentQuestionId: UUID
  tradesmanProfileId: UUID
  tradesmanProfile: TradesmanProfile
  authorId: UUID
  author: User
  replies(offset: Int = 0 limit: Int = 5): [JobPostQuestion!]! @cost(weight: "10")
  replyCount: Int! @cost(weight: "10")
  isEditable: Boolean! @cost(weight: "10")
  isAnswerEditable: Boolean! @cost(weight: "10")
  jobPostId: UUID!
  jobPost: JobPost!
  jobTaskId: UUID
  jobTask: JobTask
  parentQuestion: JobPostQuestion
  createdAt: DateTime!
  updatedAt: DateTime!
}

"Represents a specific task or phase within a job post."
type JobTask {
  id: UUID!
  jobPostId: UUID!
  title: String!
  description: String
  sequenceOrder: Int!
  acceptanceCriteria: [TaskAcceptanceCriteria!]!
  bidItems: [BidItem!]!
  questions: [JobPostQuestion!]!
  jobPost: JobPost!
  createdAt: DateTime!
  updatedAt: DateTime!
}

"The root mutation object."
type Mutation {
  "Hashes all existing plain-text passwords in the database. This is a one-time operation."
  migratePasswords: Int! @authorize(roles: [ "Admin" ]) @cost(weight: "10")
  "Authenticates a user and returns a JWT."
  login(email: String! password: String!): String! @cost(weight: "10")
  "Creates a new user in the system."
  registerUser(firstName: String! lastName: String! email: String! password: String!): User! @cost(weight: "10")
  "Creates a new service booking request."
  createBooking(homeownerId: UUID! tradesmanProfileId: UUID! requestedDate: DateTime! jobDescription: String!): Booking! @authorize(roles: [ "Homeowner" ]) @cost(weight: "10")
  "Submits a review and updates the tradesman's average rating."
  submitReview(bookingId: UUID! homeownerId: UUID! rating: Int! comment: String!): Review! @authorize(roles: [ "Homeowner" ]) @cost(weight: "10")
  "Creates a new service category with a smart blueprint template."
  createServiceCategory(name: String! description: String templateStructure: String!): ServiceCategory! @authorize(roles: [ "Admin" ]) @cost(weight: "10")
  "Creates a new project for a homeowner."
  createProject(homeownerId: UUID! title: String! description: String!): Project! @authorize(roles: [ "Homeowner" ]) @cost(weight: "10")
  "Adds a sub-job to a project using the Wizard output."
  addJobToProject(projectId: UUID! categoryId: UUID! title: String! jobDetailsJson: String! location: String estimatedSubtotal: Decimal currency: String! imageUrls: [String!]!): JobPost! @authorize(roles: [ "Homeowner" ]) @cost(weight: "10")
  saveJobPostDraft(jobPostId: UUID! jobDetailsJson: String! description: String location: String estimatedSubtotal: Decimal currency: String!): Boolean! @authorize @cost(weight: "10")
  "Updates the standardized tasks for a job post."
  updateJobTasks(input: UpdateJobTasksInput!): Boolean! @authorize(roles: [ "Admin", "Homeowner" ]) @authorize(roles: [ "Admin", "Homeowner" ]) @cost(weight: "10")
  submitJobPost(jobPostId: UUID!): Boolean! @authorize @cost(weight: "10")
  "Submits a bid for a specific job post."
  submitBid(input: SubmitBidInput!): Bid! @authorize(roles: [ "Tradesman" ]) @cost(weight: "10")
  "Hides an auction from the tradesman's available feed."
  passAuction(tradesmanProfileId: UUID! jobPostId: UUID!): Boolean! @authorize(roles: [ "Tradesman" ]) @authorize(roles: [ "Tradesman" ]) @cost(weight: "10")
  "Accepts a bid and creates a funded booking."
  acceptBid(bidId: UUID!): Booking! @authorize(roles: [ "Homeowner" ]) @cost(weight: "10")
  submitJobForScopeGeneration(jobPostId: UUID!): Boolean! @authorize @authorize @cost(weight: "10")
  approveJobScope(jobPostId: UUID! finalScope: String!): Boolean! @authorize @authorize @cost(weight: "10")
  adminReviewJobScope(jobPostId: UUID! approved: Boolean! feedback: String): Boolean! @authorize(roles: [ "Admin" ]) @authorize(roles: [ "Admin" ]) @cost(weight: "10")
  addJobFeedback(jobPostId: UUID! text: String!): JobPostFeedback! @authorize @authorize @cost(weight: "10")
  resolveJobFeedback(feedbackId: UUID!): JobPostFeedback! @authorize(roles: [ "Admin" ]) @authorize(roles: [ "Admin" ]) @cost(weight: "10")
  addAdminJobQuestion(jobPostId: UUID! questionText: String! type: String! isRequired: Boolean! options: [String!]): Boolean! @authorize(roles: [ "Admin" ]) @authorize(roles: [ "Admin" ]) @cost(weight: "10")
  "Updates a user's role and associated service categories. (Admin only)"
  updateUserRoleAndCategories(userId: UUID! newRole: UserRoleTypes! serviceCategoryIds: [UUID!]): User! @authorize(roles: [ "Admin" ]) @authorize(roles: [ "Admin" ]) @cost(weight: "10")
  "Allows a tradesman to ask a public question on an auction."
  askJobQuestion(tradesmanProfileId: UUID! jobPostId: UUID! questionText: String!): JobPostQuestion! @authorize(roles: [ "Tradesman" ]) @authorize(roles: [ "Tradesman" ]) @cost(weight: "10")
  "Allows an author to edit their public question or reply."
  editJobQuestion(questionId: UUID! newText: String!): JobPostQuestion! @authorize @authorize @cost(weight: "10")
  "Allows an author to edit their feedback or reply."
  editJobFeedback(feedbackId: UUID! newText: String!): JobPostFeedback! @authorize @authorize @cost(weight: "10")
  "Allows a homeowner to answer a tradesman's question."
  answerJobQuestion(questionId: UUID! answerText: String!): JobPostQuestion! @authorize(roles: [ "Homeowner" ]) @authorize(roles: [ "Homeowner" ]) @cost(weight: "10")
  "Allows a homeowner to edit their public answer."
  editJobAnswer(questionId: UUID! newAnswer: String!): JobPostQuestion! @authorize(roles: [ "Homeowner" ]) @authorize(roles: [ "Homeowner" ]) @cost(weight: "10")
  deleteAllNotifications: Boolean! @authorize @authorize @cost(weight: "10")
  markNotificationAsRead(notificationId: UUID!): Boolean! @authorize @authorize @cost(weight: "10")
  "Uploads a portfolio entry for a tradesman."
  addPortfolioEntry(title: String! description: String file: Upload!): PortfolioEntry! @authorize(roles: [ "Tradesman" ]) @authorize(roles: [ "Tradesman" ]) @cost(weight: "10")
  "Uploads a certification for a tradesman."
  addCertification(title: String! description: String file: Upload! issuedAt: DateTime! expiresAt: DateTime): Certification! @authorize(roles: [ "Tradesman" ]) @authorize(roles: [ "Tradesman" ]) @cost(weight: "10")
  "Updates the video introduction for a tradesman."
  updateVideoIntroduction(file: Upload!): Boolean! @authorize(roles: [ "Tradesman" ]) @authorize(roles: [ "Tradesman" ]) @cost(weight: "10")
  "Restores a previously passed auction for a tradesman."
  restoreAuction(jobId: UUID!): Boolean! @authorize(roles: [ "Tradesman" ]) @authorize(roles: [ "Tradesman" ]) @cost(weight: "10")
  updateUserProfile(userId: UUID! firstName: String! lastName: String! bio: String location: String profilePictureUrl: String): User! @authorize @cost(weight: "10")
  deleteProject(projectId: UUID!): Boolean! @authorize @cost(weight: "10")
  replyToJobQuestion(parentQuestionId: UUID! replyText: String!): JobPostQuestion! @authorize @cost(weight: "10")
  replyToJobFeedback(parentFeedbackId: UUID! text: String!): JobPostFeedback! @authorize @cost(weight: "10")
  updateCategoryStatus(categoryId: UUID! newStatus: CategoryStatus!): ServiceCategory! @authorize(roles: [ "Admin" ]) @cost(weight: "10")
  saveCategory(id: UUID name: String! description: String isGlobal: Boolean! templateStructure: String! status: CategoryStatus): ServiceCategory! @authorize(roles: [ "Admin" ]) @cost(weight: "10")
}

type Notification {
  userId: UUID!
  user: User!
  title: String!
  message: String!
  isRead: Boolean!
  relatedEntityId: UUID
  relatedEntityType: String
  id: UUID!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type PortfolioEntry {
  id: ID!
  title: String!
  imageUrl: String!
  videoUrl: String
  description: String
  tradesmanProfileId: UUID!
  tradesmanProfile: TradesmanProfile!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type Project {
  title: String!
  description: String!
  homeownerId: UUID!
  homeowner: User!
  jobPosts: [JobPost!]!
  generalSummary: String
  status: ProjectStatus!
  id: UUID!
  createdAt: DateTime!
  updatedAt: DateTime!
}

"The root query object."
type Query {
  "Gets a queryable list of tradesman profiles."
  tradesmanProfiles: [TradesmanProfile!]! @authorize(roles: [ "Admin", "Homeowner", "Tradesman" ]) @cost(weight: "10")
  "Gets the currently authenticated user."
  currentUser: User @authorize(roles: [ "Admin", "Homeowner", "Tradesman" ]) @cost(weight: "10")
  "Gets a list of all active service categories."
  serviceCategories: [ServiceCategory!]! @cost(weight: "10")
  "Gets all service categories, regardless of status. (Admin only)"
  allServiceCategories: [ServiceCategory!]! @authorize(roles: [ "Admin" ]) @authorize(roles: [ "Admin" ]) @cost(weight: "10")
  "Gets the projects created by the authenticated homeowner."
  myProjects: [Project!]! @authorize(roles: [ "Homeowner" ]) @authorize(roles: [ "Homeowner" ]) @cost(weight: "10")
  jobPostsForReview(where: JobPostFilterInput @cost(weight: "10") order: [JobPostSortInput!] @cost(weight: "10")): [JobPost!]! @authorize(roles: [ "Admin" ]) @authorize(roles: [ "Admin" ]) @cost(weight: "10")
  projectsForReview(where: ProjectFilterInput @cost(weight: "10") order: [ProjectSortInput!] @cost(weight: "10")): [Project!]! @authorize(roles: [ "Admin" ]) @authorize(roles: [ "Admin" ]) @cost(weight: "10")
  "Gets a list of all users. (Admin only)"
  users(where: UserFilterInput @cost(weight: "10") order: [UserSortInput!] @cost(weight: "10")): [User] @authorize(roles: [ "Admin" ]) @authorize(roles: [ "Admin" ]) @cost(weight: "10")
  "Gets all notifications for the current user."
  myNotifications: [Notification!]! @authorize @authorize @cost(weight: "10")
  "Gets all open auctions that match the authenticated tradesman's skills."
  availableAuctions: [Auction] @authorize(roles: [ "Tradesman" ]) @authorize(roles: [ "Tradesman" ]) @cost(weight: "10")
  "Gets a specific auction by Job ID."
  auctionById(jobId: UUID!): Auction @authorize @authorize(roles: [ "Admin", "Homeowner", "Tradesman" ]) @cost(weight: "10")
  "Gets a specific job post question by ID."
  jobPostQuestionById(id: UUID!): JobPostQuestion @authorize @authorize @cost(weight: "10")
  passedAuctions: [Auction!]! @authorize(roles: [ "Tradesman" ]) @cost(weight: "10")
  projectById(projectId: UUID!): Project @authorize @cost(weight: "10")
  allJobPosts(where: JobPostFilterInput @cost(weight: "10") order: [JobPostSortInput!] @cost(weight: "10")): [JobPost!]! @cost(weight: "10")
  allProjects(where: ProjectFilterInput @cost(weight: "10") order: [ProjectSortInput!] @cost(weight: "10")): [Project!]! @cost(weight: "10")
}

"Represents a review of a tradesman's service by a homeowner."
type Review {
  id: ID!
  rating: Int!
  comment: String
  bookingId: ID!
  homeownerId: ID!
  tradesmanProfileId: ID!
  booking: Booking!
  homeowner: User!
  tradesmanProfile: TradesmanProfile!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type ServiceCategory {
  name: String!
  description: String
  status: CategoryStatus!
  isGlobal: Boolean!
  templateStructure: String!
  id: UUID!
  createdAt: DateTime!
  updatedAt: DateTime!
}

"Represents a specific acceptance criterion for a job task."
type TaskAcceptanceCriteria {
  id: UUID!
  jobTaskId: UUID!
  description: String!
  jobTask: JobTask!
  createdAt: DateTime!
  updatedAt: DateTime!
}

"Represents the specific profile for a tradesman, extending the base User entity with role-specific data."
type TradesmanProfile {
  id: ID!
  userId: ID!
  averageRating: Float!
  isVerified: Boolean!
  videoIntroductionUrl: String
  "The list of skills and service categories this tradesman offers."
  skills: [TradesmanSkill!]!
  "The tradesman's portfolio items."
  portfolioEntries: [PortfolioEntry!]!
  "The tradesman's certifications and credentials."
  certifications: [Certification!]!
  user: User!
  bookings: [Booking!]!
  reviews: [Review!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

"Represents a specific skill or service category offered by a tradesman."
type TradesmanSkill {
  id: ID!
  serviceCategoryId: ID!
  "The verification level of this skill (Unverified, PortfolioVerified, etc.)"
  verificationStatus: SkillVerificationStatus!
  serviceCategory: ServiceCategory!
  tradesmanProfileId: UUID!
  tradesmanProfile: TradesmanProfile!
  yearsOfExperience: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
}

"Represents a user of the application, who can be a homeowner or a tradesman."
type User {
  id: ID!
  firstName: String!
  lastName: String!
  email: String!
  phoneNumber: String
  role: UserRoleTypes!
  bio: String
  location: String
  profilePictureUrl: String
  homeownerProfile: HomeownerProfile
  tradesmanProfile: TradesmanProfile
  isEmailVerified: Boolean!
  emailVerificationToken: String
  emailVerificationTokenExpires: DateTime
  createdAt: DateTime!
  updatedAt: DateTime!
}

input AmountFilterInput {
  and: [AmountFilterInput!]
  or: [AmountFilterInput!]
  currency: StringOperationFilterInput
  subtotal: DecimalOperationFilterInput
  tax: DecimalOperationFilterInput
  total: DecimalOperationFilterInput
}

input AmountSortInput {
  currency: SortEnumType @cost(weight: "10")
  subtotal: SortEnumType @cost(weight: "10")
  tax: SortEnumType @cost(weight: "10")
  total: SortEnumType @cost(weight: "10")
}

input BidFilterInput {
  and: [BidFilterInput!]
  or: [BidFilterInput!]
  jobPostId: UuidOperationFilterInput
  jobPost: JobPostFilterInput
  tradesmanProfileId: UuidOperationFilterInput
  tradesmanProfile: TradesmanProfileFilterInput
  amount: AmountFilterInput
  bidItems: ListFilterInputTypeOfBidItemFilterInput
  earliestStartDate: DateTimeOperationFilterInput
  latestStartDate: DateTimeOperationFilterInput
  estimatedDurationDays: IntOperationFilterInput
  comment: StringOperationFilterInput
  linkedAmendmentVersion: IntOperationFilterInput
  isAccepted: BooleanOperationFilterInput
  acceptedAt: DateTimeOperationFilterInput
  isRejected: BooleanOperationFilterInput
  isOutdated: BooleanOperationFilterInput
  id: UuidOperationFilterInput
  createdAt: DateTimeOperationFilterInput
  updatedAt: DateTimeOperationFilterInput
}

input BidItemFilterInput {
  and: [BidItemFilterInput!]
  or: [BidItemFilterInput!]
  bidId: UuidOperationFilterInput
  bid: BidFilterInput
  jobTaskId: UuidOperationFilterInput
  jobTask: JobTaskFilterInput
  price: AmountFilterInput
  comment: StringOperationFilterInput
  id: UuidOperationFilterInput
  createdAt: DateTimeOperationFilterInput
  updatedAt: DateTimeOperationFilterInput
}

"Represents a priced item mapping to a JobTask."
input BidItemInput {
  jobTaskId: UUID!
  priceSubtotal: Decimal!
  comment: String
}

input BookingFilterInput {
  and: [BookingFilterInput!]
  or: [BookingFilterInput!]
  requestedDate: DateTimeOperationFilterInput
  scheduledDate: DateTimeOperationFilterInput
  jobDescription: StringOperationFilterInput
  status: BookingStatusTypesOperationFilterInput
  agreedBidAmount: AmountFilterInput
  platformFeeHomeowner: AmountFilterInput
  platformFeeTradesman: AmountFilterInput
  totalEscrowAmount: AmountFilterInput
  isFunded: BooleanOperationFilterInput
  homeownerId: UuidOperationFilterInput
  homeowner: UserFilterInput
  tradesmanProfileId: UuidOperationFilterInput
  tradesmanProfile: TradesmanProfileFilterInput
  review: ReviewFilterInput
  changeOrders: ListFilterInputTypeOfChangeOrderFilterInput
  id: UuidOperationFilterInput
  createdAt: DateTimeOperationFilterInput
  updatedAt: DateTimeOperationFilterInput
}

input BookingStatusTypesOperationFilterInput {
  eq: BookingStatusTypes @cost(weight: "10")
  neq: BookingStatusTypes @cost(weight: "10")
  in: [BookingStatusTypes!] @cost(weight: "10")
  nin: [BookingStatusTypes!] @cost(weight: "10")
}

input BooleanOperationFilterInput {
  eq: Boolean @cost(weight: "10")
  neq: Boolean @cost(weight: "10")
}

input CategoryStatusOperationFilterInput {
  eq: CategoryStatus @cost(weight: "10")
  neq: CategoryStatus @cost(weight: "10")
  in: [CategoryStatus!] @cost(weight: "10")
  nin: [CategoryStatus!] @cost(weight: "10")
}

input CertificationFilterInput {
  and: [CertificationFilterInput!]
  or: [CertificationFilterInput!]
  title: StringOperationFilterInput
  description: StringOperationFilterInput
  documentUrl: StringOperationFilterInput
  issuedAt: DateTimeOperationFilterInput
  expiresAt: DateTimeOperationFilterInput
  tradesmanProfileId: UuidOperationFilterInput
  tradesmanProfile: TradesmanProfileFilterInput
  id: UuidOperationFilterInput
  createdAt: DateTimeOperationFilterInput
  updatedAt: DateTimeOperationFilterInput
}

input ChangeOrderFilterInput {
  and: [ChangeOrderFilterInput!]
  or: [ChangeOrderFilterInput!]
  bookingId: UuidOperationFilterInput
  booking: BookingFilterInput
  newTotalAmount: AmountFilterInput
  differenceAmount: AmountFilterInput
  reason: StringOperationFilterInput
  status: ChangeOrderStatusOperationFilterInput
  id: UuidOperationFilterInput
  createdAt: DateTimeOperationFilterInput
  updatedAt: DateTimeOperationFilterInput
}

input ChangeOrderStatusOperationFilterInput {
  eq: ChangeOrderStatus @cost(weight: "10")
  neq: ChangeOrderStatus @cost(weight: "10")
  in: [ChangeOrderStatus!] @cost(weight: "10")
  nin: [ChangeOrderStatus!] @cost(weight: "10")
}

input DateTimeOperationFilterInput {
  eq: DateTime @cost(weight: "10")
  neq: DateTime @cost(weight: "10")
  in: [DateTime] @cost(weight: "10")
  nin: [DateTime] @cost(weight: "10")
  gt: DateTime @cost(weight: "10")
  ngt: DateTime @cost(weight: "10")
  gte: DateTime @cost(weight: "10")
  ngte: DateTime @cost(weight: "10")
  lt: DateTime @cost(weight: "10")
  nlt: DateTime @cost(weight: "10")
  lte: DateTime @cost(weight: "10")
  nlte: DateTime @cost(weight: "10")
}

input DecimalOperationFilterInput {
  eq: Decimal @cost(weight: "10")
  neq: Decimal @cost(weight: "10")
  in: [Decimal] @cost(weight: "10")
  nin: [Decimal] @cost(weight: "10")
  gt: Decimal @cost(weight: "10")
  ngt: Decimal @cost(weight: "10")
  gte: Decimal @cost(weight: "10")
  ngte: Decimal @cost(weight: "10")
  lt: Decimal @cost(weight: "10")
  nlt: Decimal @cost(weight: "10")
  lte: Decimal @cost(weight: "10")
  nlte: Decimal @cost(weight: "10")
}

input FloatOperationFilterInput {
  eq: Float @cost(weight: "10")
  neq: Float @cost(weight: "10")
  in: [Float] @cost(weight: "10")
  nin: [Float] @cost(weight: "10")
  gt: Float @cost(weight: "10")
  ngt: Float @cost(weight: "10")
  gte: Float @cost(weight: "10")
  ngte: Float @cost(weight: "10")
  lt: Float @cost(weight: "10")
  nlt: Float @cost(weight: "10")
  lte: Float @cost(weight: "10")
  nlte: Float @cost(weight: "10")
}

input HomeownerProfileFilterInput {
  and: [HomeownerProfileFilterInput!]
  or: [HomeownerProfileFilterInput!]
  userId: UuidOperationFilterInput
  user: UserFilterInput
  address: StringOperationFilterInput
  id: UuidOperationFilterInput
  createdAt: DateTimeOperationFilterInput
  updatedAt: DateTimeOperationFilterInput
}

input HomeownerProfileSortInput {
  userId: SortEnumType @cost(weight: "10")
  user: UserSortInput @cost(weight: "10")
  address: SortEnumType @cost(weight: "10")
  id: SortEnumType @cost(weight: "10")
  createdAt: SortEnumType @cost(weight: "10")
  updatedAt: SortEnumType @cost(weight: "10")
}

input IntOperationFilterInput {
  eq: Int @cost(weight: "10")
  neq: Int @cost(weight: "10")
  in: [Int] @cost(weight: "10")
  nin: [Int] @cost(weight: "10")
  gt: Int @cost(weight: "10")
  ngt: Int @cost(weight: "10")
  gte: Int @cost(weight: "10")
  ngte: Int @cost(weight: "10")
