fragment UserDetails on User {
  id
  firstName
  lastName
  profilePictureUrl
}

fragment FeedbackReplyDetails on JobPostFeedback {
  id
  jobPostId
  parentFeedbackId
  text
  createdAt
  isEdited
  isEditable
  author {
    ... UserDetails
  }
}

fragment FeedbackDetails on JobPostFeedback {
  id
  jobPostId
  text
  isResolved
  createdAt
  isEdited
  isEditable
  author {
    ... UserDetails
  }
  replies {
    ... FeedbackReplyDetails
  }
}

fragment QuestionReplyDetails on JobPostQuestion {
  id
  parentQuestionId
  tradesmanProfileId
  authorId
  questionText
  createdAt
  updatedAt
  isEdited
  isEditable
  tradesmanProfile {
    id
    user {
      ... UserDetails
    }
  }
  author {
    ... UserDetails
  }
}

fragment QuestionDetails on JobPostQuestion {
  id
  jobPostId
  questionText
  answerText
  answeredAt
  isAnswered
  isEdited
  isAnswerEdited
  isEditable
  isAnswerEditable
  authorId
  tradesmanProfileId
  createdAt
  updatedAt
  replyCount
  tradesmanProfile {
    id
    user {
      ... UserDetails
    }
  }
  author {
    ... UserDetails
  }
}

fragment AcceptanceCriteriaDetails on TaskAcceptanceCriteria {
  id
  description
}

fragment JobTaskDetails on JobTask {
  id
  title
  description
  sequenceOrder
  acceptanceCriteria {
    ... AcceptanceCriteriaDetails
  }
}

fragment JobPostDetails on JobPost {
  id
  title
  description
  jobDetails
  location
  project {
    id
  }
  status
  generatedScope
  userEditedScope
  adminFeedback
  additionalQuestionsJson
  estimatedBudget {
    total
    currency
  }
  serviceCategory {
    id
    name
  }
  createdAt
  updatedAt
  feedbacks {
    ... FeedbackDetails
  }
  questions {
    ... QuestionDetails
  }
  bids {
    id
    amount {
      total
      currency
    }
    comment
    isAccepted
    isRejected
    isOutdated
    tradesmanProfile {
      id
      user {
        ... UserDetails
      }
    }
    bidItems {
      id
      price {
        total
        currency
      }
      comment
      jobTask {
        id
        title
        description
        sequenceOrder
      }
    }
  }
}

fragment ProjectDetails on Project {
  id
  title
  description
  status
  createdAt
  generalSummary
  homeowner {
    id
    firstName
    lastName
  }
  jobPosts {
    ... JobPostDetails
  }
}