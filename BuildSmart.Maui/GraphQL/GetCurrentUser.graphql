query GetCurrentUser {
  currentUser {
    id
    firstName
    lastName
    email
    phoneNumber
    role
    bio
    location
    profilePictureUrl
    tradesmanProfile {
      id
      videoIntroductionUrl
      portfolioEntries {
        id
        title
        description
        imageUrl
      }
      certifications {
        id
        title
        description
        documentUrl
        issuedAt
        expiresAt
      }
    }
  }
}
