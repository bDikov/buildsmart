query GetProjectsForReview {
  projectsForReview {
    id
    title
    description
    status
    createdAt
    homeowner {
      id
      firstName
      lastName
    }
    jobPosts {
      id
      title
      description
      generatedScope
      userEditedScope
      status
      jobDetails
      additionalQuestionsJson
      location
      estimatedBudget {
        total
        currency
      }
      adminFeedback
      serviceCategory {
        name
        templateStructure
      }
      feedbacks {
        id
        text
        isResolved
        createdAt
        author {
          id
          firstName
          lastName
          profilePictureUrl
        }
        replies {
          id
          text
          createdAt
          author {
            id
            firstName
            lastName
            profilePictureUrl
          }
        }
      }
      questions {
        id
        questionText
        answerText
        isAnswered
        authorId
        tradesmanProfileId
        tradesmanProfile {
          user {
            firstName
            lastName
          }
        }
        author {
          id
          firstName
          lastName
          profilePictureUrl
        }
        replies {
          id
          parentQuestionId
          tradesmanProfileId
          authorId
          questionText
          createdAt
          tradesmanProfile {
            id
            user {
              firstName
              lastName
              profilePictureUrl
            }
          }
          author {
            id
            firstName
            lastName
            profilePictureUrl
          }
        }
      }
    }
  }
}

query GetJobsForReview {
  jobPostsForReview {
    id
    title
    description
    generatedScope
    userEditedScope
    status
    jobDetails
    additionalQuestionsJson
    adminFeedback
    serviceCategory {
      name
      templateStructure
    }
    project {
      id
      title
      description
      status
      homeowner {
        firstName
        lastName
      }
      jobPosts {
        id
        title
        status
        serviceCategory {
          name
        }
      }
    }
    feedbacks {
      id
      text
      isResolved
      createdAt
      author {
        id
        firstName
        lastName
        profilePictureUrl
      }
      replies {
        id
        text
        createdAt
        author {
          id
          firstName
          lastName
          profilePictureUrl
        }
      }
    }
    questions {
      id
      questionText
      answerText
      isAnswered
      isEdited
      isAnswerEdited
      authorId
      tradesmanProfileId
      tradesmanProfile {
        user {
          firstName
          lastName
        }
      }
      author {
        id
        firstName
        lastName
        profilePictureUrl
      }
      replies {
        id
        parentQuestionId
        tradesmanProfileId
        authorId
        questionText
        createdAt
        tradesmanProfile {
          id
          user {
            firstName
            lastName
            profilePictureUrl
          }
        }
        author {
          id
          firstName
          lastName
          profilePictureUrl
        }
      }
    }
  }
}

mutation AdminReviewJobScope($jobPostId: UUID!, $approved: Boolean!, $feedback: String) {
  adminReviewJobScope(jobPostId: $jobPostId, approved: $approved, feedback: $feedback)
}

mutation AddJobFeedback($jobPostId: UUID!, $text: String!) {
  addJobFeedback(jobPostId: $jobPostId, text: $text) {
    id
    text
    createdAt
    author {
      id
      firstName
      lastName
      profilePictureUrl
    }
  }
}

mutation AddAdminJobQuestion($jobPostId: UUID!, $questionText: String!, $type: String!, $isRequired: Boolean!, $options: [String!]) {
  addAdminJobQuestion(jobPostId: $jobPostId, questionText: $questionText, type: $type, isRequired: $isRequired, options: $options)
}

mutation ResolveJobFeedback($feedbackId: UUID!) {
  resolveJobFeedback(feedbackId: $feedbackId) {
    id
    isResolved
  }
}
