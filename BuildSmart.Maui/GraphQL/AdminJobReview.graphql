query GetProjectsForReview {
  projectsForReview {
    id
    title
    description
    status
    createdAt
    homeowner {
      id
      firstName
      lastName
    }
    jobPosts {
      id
      title
      description
      generatedScope
      userEditedScope
      status
      jobDetails
      location
      estimatedBudget {
        total
        currency
      }
      adminFeedback
      serviceCategory {
        name
        templateStructure
      }
      feedbacks {
        id
        text
        isResolved
        createdAt
        author {
          id
          firstName
          lastName
          role
        }
      }
    }
  }
}

query GetJobsForReview {
  jobPostsForReview {
    id
    title
    description
    generatedScope
    userEditedScope
    status
    jobDetails
    adminFeedback
    serviceCategory {
      name
      templateStructure
    }
    project {
      id
      title
      description
      status
      homeowner {
        firstName
        lastName
      }
      jobPosts {
        id
        title
        status
        serviceCategory {
          name
        }
      }
    }
    feedbacks {
      id
      text
      isResolved
      createdAt
      author {
        id
        firstName
        lastName
        role
      }
    }
  }
}

mutation AdminReviewJobScope($jobPostId: UUID!, $approved: Boolean!, $feedback: String) {
  adminReviewJobScope(jobPostId: $jobPostId, approved: $approved, feedback: $feedback)
}

mutation AddJobFeedback($jobPostId: UUID!, $text: String!) {
  addJobFeedback(jobPostId: $jobPostId, text: $text) {
    id
    text
    createdAt
  }
}

mutation ResolveJobFeedback($feedbackId: UUID!) {
  resolveJobFeedback(feedbackId: $feedbackId)
}