mutation AskJobQuestion($tradesmanProfileId: UUID!, $jobPostId: UUID!, $questionText: String!) {
  askJobQuestion(tradesmanProfileId: $tradesmanProfileId, jobPostId: $jobPostId, questionText: $questionText) {
    id
    questionText
  }
}

mutation EditJobQuestion($questionId: UUID!, $newText: String!) {
  editJobQuestion(questionId: $questionId, newText: $newText) {
    id
    questionText
    isEdited
  }
}

mutation EditJobAnswer($questionId: UUID!, $newAnswer: String!) {
  editJobAnswer(questionId: $questionId, newAnswer: $newAnswer) {
    id
    answerText
    isAnswerEdited
  }
}

mutation AnswerJobQuestion($questionId: UUID!, $answerText: String!) {
  answerJobQuestion(questionId: $questionId, answerText: $answerText) {
    id
    answerText
    isAnswered
  }
}

mutation PassAuction($tradesmanProfileId: UUID!, $jobPostId: UUID!) {
  passAuction(tradesmanProfileId: $tradesmanProfileId, jobPostId: $jobPostId)
}

mutation RestoreAuction($jobId: UUID!) {
  restoreAuction(jobId: $jobId)
}

mutation SubmitBid($tradesmanProfileId: UUID!, $jobPostId: UUID!, $subtotal: Decimal!, $currency: String!, $comment: String) {
  submitBid(tradesmanProfileId: $tradesmanProfileId, jobPostId: $jobPostId, subtotal: $subtotal, currency: $currency, comment: $comment) {
    id
    amount {
      total
      currency
    }
  }
}

mutation ReplyToJobQuestion($parentQuestionId: UUID!, $replyText: String!) {
  replyToJobQuestion(parentQuestionId: $parentQuestionId, replyText: $replyText) {
    id
    questionText
    createdAt
  }
}
