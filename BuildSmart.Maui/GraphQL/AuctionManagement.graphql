query GetAvailableAuctions {
  availableAuctions {
    job {
      id
      title
      description
      location
      status
      imageUrls
      amendmentCount
      estimatedBudget {
        total
        currency
      }
      serviceCategory {
        id
        name
      }
      project {
        id
        title
        description
        homeowner {
          id
          firstName
          lastName
        }
      }
    }
    bids {
      id
      amount {
        total
        currency
      }
      comment
      isAccepted
      isRejected
      isOutdated
      tradesmanProfile {
        id
        user {
          firstName
        }
      }
    }
    questions {
      id
      jobPostId
      tradesmanProfileId
      authorId
      questionText
      answerText
      answeredAt
      isAnswered
      isEdited
      isAnswerEdited
      tradesmanProfile {
        id
        user {
          firstName
          lastName
          profilePictureUrl
        }
      }
      author {
        id
        firstName
        lastName
        profilePictureUrl
      }
      replies {
        id
        parentQuestionId
        tradesmanProfileId
        authorId
        questionText
        createdAt
        tradesmanProfile {
          id
          user {
            firstName
            lastName
            profilePictureUrl
          }
        }
        author {
          id
          firstName
          lastName
          profilePictureUrl
        }
      }
    }
  }
}

