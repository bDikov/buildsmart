mutation CreateProject($homeownerId: UUID!, $title: String!, $description: String!) {
    createProject(homeownerId: $homeownerId, title: $title, description: $description) {
        id
        title
        status
    }
}

mutation AddJobToProject(
    $projectId: UUID!, 
    $categoryId: UUID!, 
    $title: String!, 
    $jobDetailsJson: String!, 
    $location: String,
    $estimatedSubtotal: Decimal,
    $currency: String!,
    $imageUrls: [String!]!
) {
    addJobToProject(
        projectId: $projectId,
        categoryId: $categoryId,
        title: $title,
        jobDetailsJson: $jobDetailsJson,
        location: $location,
        estimatedSubtotal: $estimatedSubtotal,
        currency: $currency,
        imageUrls: $imageUrls
    ) {
        id
        title
        amendmentCount
    }
}

mutation SubmitJobForScopeGeneration($jobPostId: UUID!) {
    submitJobForScopeGeneration(jobPostId: $jobPostId)
}

mutation ApproveJobScope($jobPostId: UUID!, $finalScope: String!) {
    approveJobScope(jobPostId: $jobPostId, finalScope: $finalScope)
}
