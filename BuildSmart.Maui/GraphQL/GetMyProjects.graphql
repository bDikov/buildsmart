query GetMyProjects {
  myProjects {
    id
    title
    description
    status
    createdAt
    jobPosts {
      id
      title
      description
      jobDetails
      location
      project {
        id
      }
      status
      generatedScope
      userEditedScope
      adminFeedback
      additionalQuestionsJson
      estimatedBudget {
        total
        currency
      }
      serviceCategory {
        id
        name
        isGlobal
        templateStructure
      }
      feedbacks {
        id
        text
        isResolved
        createdAt
        author {
          id
          firstName
          lastName
          profilePictureUrl
        }
        replies {
          id
          parentFeedbackId
          text
          createdAt
          author {
            id
            firstName
            lastName
            profilePictureUrl
          }
        }
      }
      questions {
        id
        questionText
        answerText
        answeredAt
        isAnswered
        isEdited
        isAnswerEdited
        authorId
        tradesmanProfileId
        tradesmanProfile {
          id
          user {
            firstName
            lastName
            profilePictureUrl
          }
        }
        author {
          id
          firstName
          lastName
          profilePictureUrl
        }
        replies {
          id
          parentQuestionId
          tradesmanProfileId
          authorId
          questionText
          createdAt
          tradesmanProfile {
            id
            user {
              firstName
              lastName
              profilePictureUrl
            }
          }
          author {
            id
            firstName
            lastName
            profilePictureUrl
          }
        }
      }
    }
  }
}
