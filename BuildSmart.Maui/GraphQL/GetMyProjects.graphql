query GetMyProjects {
  myProjects {
    id
    title
    description
    status
    createdAt
    jobPosts {
      id
      title
      description
      jobDetails
      location
      status
      generatedScope
      userEditedScope
      adminFeedback
      estimatedBudget {
        total
        currency
      }
      serviceCategory {
        id
        name
        isGlobal
        templateStructure
      }
    }
  }
}
