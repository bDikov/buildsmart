version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpassword
      - POSTGRES_DB=buildsmart_test
    ports:
      - '5432:5432'

tests:
  build:
    context: .
    dockerfile: BuildSmart.Api.Tests/Dockerfile
  depends_on:
    - db
  environment:
    - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=buildsmart_test;Username=testuser;Password=testpassword
