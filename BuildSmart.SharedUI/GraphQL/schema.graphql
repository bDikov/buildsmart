"The root mutation object."
type Mutation {
  "Hashes all existing plain-text passwords in the database. This is a one-time operation."
  migratePasswords: Int!
  "Authenticates a user and returns a JWT."
  login(email: String! password: String!): String!
  "Creates a new user in the system."
  registerUser(firstName: String! lastName: String! email: String! password: String!): User!
  "Submits a review and updates the tradesman's average rating."
  submitReview(bookingId: UUID! homeownerId: UUID! rating: Int! comment: String!): Review!
  "Creates a new service category with a smart blueprint template."
  createServiceCategory(name: String! description: String templateStructure: String!): ServiceCategory!
  "Creates a new billable SKU for a service category."
  createServiceSku(categoryId: UUID! skuCode: String! name: String! description: String! basePrice: Decimal! unitType: String!): ServiceSku!
  "Updates an existing billable SKU."
  updateServiceSku(id: UUID! skuCode: String! name: String! description: String! basePrice: Decimal! unitType: String!): ServiceSku!
  "Deletes an existing billable SKU."
  deleteServiceSku(id: UUID!): Boolean!
  "Creates a new project for a homeowner."
  createProject(homeownerId: UUID! title: String! description: String!): Project!
  "Adds a sub-job to a project using the Wizard output."
  addJobToProject(projectId: UUID! categoryId: UUID! title: String! jobDetailsJson: String! location: String estimatedSubtotal: Decimal currency: String! imageUrls: [String!]! preferredSiteVisitDate: DateTime): JobPost!
  saveJobPostDraft(jobPostId: UUID! jobDetailsJson: String! description: String location: String estimatedSubtotal: Decimal currency: String!): Boolean!
  "Updates the standardized tasks for a job post."
  updateJobTasks(input: UpdateJobTasksInput!): Boolean!
  submitJobPost(jobPostId: UUID!): Boolean!
  "Submits a bid for a specific job post."
  submitBid(input: SubmitBidInput!): Bid!
  "Hides an auction from the tradesman's available feed."
  passAuction(tradesmanProfileId: UUID! jobPostId: UUID!): Boolean!
  "Accepts a bid and creates a funded booking."
  acceptBid(bidId: UUID!): Booking!
  "Approves a milestone for payment."
  approveMilestone(milestonePaymentId: UUID!): Boolean!
  submitJobForScopeGeneration(jobPostId: UUID!): Boolean!
  approveJobScope(jobPostId: UUID! finalScope: String!): Boolean!
  adminReviewJobScope(jobPostId: UUID! approved: Boolean! feedback: String): Boolean!
  addJobFeedback(jobPostId: UUID! text: String!): JobPostFeedback!
  resolveJobFeedback(feedbackId: UUID!): JobPostFeedback!
  addAdminJobQuestion(jobPostId: UUID! questionText: String! type: String! isRequired: Boolean! options: [String!]): Boolean!
  "Updates a user's role and associated service categories. (Admin only)"
  updateUserRoleAndCategories(userId: UUID! newRole: UserRoleTypes! serviceCategoryIds: [UUID!]): User!
  "Allows a tradesman to ask a public question on an auction."
  askJobQuestion(tradesmanProfileId: UUID! jobPostId: UUID! questionText: String!): JobPostQuestion!
  "Allows an author to edit their public question or reply."
  editJobQuestion(questionId: UUID! newText: String!): JobPostQuestion!
  "Allows an author to edit their feedback or reply."
  editJobFeedback(feedbackId: UUID! newText: String!): JobPostFeedback!
  "Allows a homeowner to answer a tradesman's question."
  answerJobQuestion(questionId: UUID! answerText: String!): JobPostQuestion!
  "Allows a homeowner to edit their public answer."
  editJobAnswer(questionId: UUID! newAnswer: String!): JobPostQuestion!
  deleteAllNotifications: Boolean!
  markNotificationAsRead(notificationId: UUID!): Boolean!
  "Uploads a portfolio entry for a tradesman."
  addPortfolioEntry(title: String! description: String file: Upload!): PortfolioEntry!
  "Uploads a certification for a tradesman."
  addCertification(title: String! description: String file: Upload! issuedAt: DateTime! expiresAt: DateTime): Certification!
  "Updates the video introduction for a tradesman."
  updateVideoIntroduction(file: Upload!): Boolean!
  "Restores a previously passed auction for a tradesman."
  restoreAuction(jobId: UUID!): Boolean!
  updateUserProfile(userId: UUID! firstName: String! lastName: String! bio: String location: String profilePictureUrl: String phoneNumber: String email: String): User!
  deleteProject(projectId: UUID!): Boolean!
  replyToJobQuestion(parentQuestionId: UUID! replyText: String!): JobPostQuestion!
  replyToJobFeedback(parentFeedbackId: UUID! text: String!): JobPostFeedback!
  updateCategoryStatus(categoryId: UUID! newStatus: CategoryStatus!): ServiceCategory!
  saveCategory(id: UUID name: String! description: String isGlobal: Boolean! templateStructure: String! status: CategoryStatus): ServiceCategory!
}

