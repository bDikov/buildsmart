"The root query object."
type Query {
  "Gets a queryable list of tradesman profiles."
  tradesmanProfiles: [TradesmanProfile!]!
  "Gets the currently authenticated user."
  currentUser: User
  "Gets a list of all active service categories."
  serviceCategories: [ServiceCategory!]!
  "Gets all service categories, regardless of status. (Admin only)"
  allServiceCategories: [ServiceCategory!]!
  "Gets the projects created by the authenticated homeowner."
  myProjects: [Project!]!
  jobPostsForReview(where: JobPostFilterInput order: [JobPostSortInput!]): [JobPost!]!
  projectsForReview(where: ProjectFilterInput order: [ProjectSortInput!]): [Project!]!
  "Gets a list of all users. (Admin only)"
  users(where: UserFilterInput order: [UserSortInput!]): [User]
  "Gets all notifications for the current user."
  myNotifications: [Notification!]!
  "Gets all open auctions that match the authenticated tradesman's skills."
  availableAuctions: [Auction]
  "Gets a specific auction by Job ID."
  auctionById(jobId: UUID!): Auction
  "Gets a specific job post question by ID."
  jobPostQuestionById(id: UUID!): JobPostQuestion
  serviceSkusByCategory(categoryId: UUID!): [ServiceSku!]!
  aiCalculation(projectId: UUID! categoryId: UUID!): [AiCalculation!]!
  aiCalculationByJob(jobId: UUID!): [AiCalculation!]!
  passedAuctions: [Auction!]!
  projectById(projectId: UUID!): Project
  allJobPosts(where: JobPostFilterInput order: [JobPostSortInput!]): [JobPost!]!
  bidDetailsById(bidId: UUID!): Bid
  allProjects(where: ProjectFilterInput order: [ProjectSortInput!]): [Project!]!
  myActiveBookings(where: BookingFilterInput order: [BookingSortInput!]): [Booking!]!
}

"Defines when a policy shall be executed."
enum ApplyPolicy {
  "Before the resolver was executed."
  BEFORE_RESOLVER
  "After the resolver was executed."
  AFTER_RESOLVER
  "The policy is applied in the validation step before the execution."
  VALIDATION
}

