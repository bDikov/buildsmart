mutation SaveCategory($id: UUID, $name: String!, $description: String, $isGlobal: Boolean!, $templateStructure: String!, $status: CategoryStatus) {
  saveCategory(id: $id, name: $name, description: $description, isGlobal: $isGlobal, templateStructure: $templateStructure, status: $status) {
    id
    name
    status
  }
}