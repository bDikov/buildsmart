mutation AcceptBid($bidId: UUID!) {
  acceptBid(bidId: $bidId) {
    id
    status
    agreedBidAmount {
      total
      currency
    }
    platformFeeHomeowner {
      total
      currency
    }
    totalEscrowAmount {
      total
      currency
    }
    milestonePayments {
      id
      jobTaskId
      amountAllocated {
        total
        currency
      }
      status
    }
  }
}

mutation ApproveMilestone($milestonePaymentId: UUID!) {
  approveMilestone(milestonePaymentId: $milestonePaymentId)
}
