name: BuildSmart CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# Cancel any in-progress runs of this workflow when a new push occurs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Globally suppress Node.js 20 deprecation warnings for all jobs
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Restore dependencies for API Tests
        run: dotnet restore BuildSmart.Api.Tests/BuildSmart.Api.Tests.csproj

      - name: Restore dependencies for Domain Tests
        run: dotnet restore BuildSmart.Core.Domain.Tests/BuildSmart.Core.Domain.Tests.csproj

      - name: Run API Tests
        run: dotnet test BuildSmart.Api.Tests/BuildSmart.Api.Tests.csproj --no-restore --verbosity normal -c Release

      - name: Run Domain Tests
        run: dotnet test BuildSmart.Core.Domain.Tests/BuildSmart.Core.Domain.Tests.csproj --no-restore --verbosity normal -c Release

  build-android:
    name: Build Android APK
    needs: test
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'

      - name: Build MAUI Android App
        run: dotnet publish BuildSmart.Maui/BuildSmart.Maui.csproj -f net9.0-android -c Release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: BuildSmart.Maui/bin/Release/net9.0-android/**/*-Signed.apk

  deploy-backend:
    name: Deploy Backend & Database
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy repository contents via scp
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          # Exclude heavy Android/MAUI, Test, and Git folders from the server payload to speed up transfer
          source: "docker-compose.prod.yml,Caddyfile,BuildSmart.sln,BuildSmart.Api/,BuildSmart.Web/,BuildSmart.Core.Domain/,BuildSmart.Core.Application/,BuildSmart.Infrastructure/,BuildSmart.SharedUI/"
          target: "/opt/buildsmart"
          
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          script: |
            cd /opt/buildsmart
            
            # Create an environment file from GitHub Secrets to be used by docker-compose
            echo "POSTGRES_USER=${{ secrets.DB_USER }}" > .env
            echo "POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "POSTGRES_DB=${{ secrets.DB_NAME }}" >> .env
            echo "DOMAIN_WEB=${{ secrets.DOMAIN_WEB }}" >> .env
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
            echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
            echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env
            
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml build
            docker compose -f docker-compose.prod.yml up -d