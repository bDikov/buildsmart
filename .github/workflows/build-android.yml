name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Install MAUI workload
      run: dotnet workload install maui

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'microsoft'
        java-version: '17'

    - name: Build MAUI Android App
      run: dotnet publish BuildSmart.Maui/BuildSmart.Maui.csproj -f net9.0-android -c Release

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: BuildSmart.Maui/bin/Release/net9.0-android/**/*-Signed.apk